name: niuro-loan-mvp

services:
  niuro-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-NiuroLocal#2026!}"
    ports:
      - "${SQLSERVER_HOST_PORT:-14333}:1433"
    volumes:
      - niuro_sqlserver_data:/var/opt/mssql

  niuro-api:
    build:
      context: .
      dockerfile: backend/src/Fundo.Applications.WebApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      Database__AutoMigrate: "true"
      ConnectionStrings__DefaultConnection: "Server=niuro-sqlserver,1433;Database=${SQLSERVER_DATABASE:-FundoLoans};User Id=sa;Password=${MSSQL_SA_PASSWORD:-NiuroLocal#2026!};TrustServerCertificate=True;Encrypt=False"
      Cors__PolicyName: AngularDevelopment
      Cors__AllowedOrigins__0: "${FRONTEND_ORIGIN:-http://localhost:4200}"
    ports:
      - "${API_HTTP_PORT:-5080}:8080"
    depends_on:
      - niuro-sqlserver

volumes:
  niuro_sqlserver_data:
